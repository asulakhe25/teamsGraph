<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Team Skills Directory</title>
<script src="https://unpkg.com/react@18/umd/react.development.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap');
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Inter',sans-serif;background:#f8fafc;}
.wrap{min-height:100vh;padding:28px 20px;max-width:860px;margin:0 auto;}
.header-card{background:linear-gradient(135deg,#0078d4,#106ebe);padding:28px;color:#fff;border-radius:16px;margin-bottom:20px;}
.card{background:#fff;border-radius:16px;border:1px solid #e2e8f0;}
.section{padding:24px;}
.tab-bar{display:flex;gap:2px;background:#f1f5f9;border-radius:10px;padding:3px;width:fit-content;margin-bottom:20px;}
.tab-btn{padding:8px 20px;border:none;border-radius:8px;font-size:13px;font-weight:500;cursor:pointer;transition:all .15s;font-family:'Inter',sans-serif;}
.tab-active{background:#fff;color:#0078d4;box-shadow:0 1px 3px rgba(0,0,0,.1);}
.tab-inactive{background:transparent;color:#64748b;}
.field{width:100%;padding:10px 14px;border:1.5px solid #e2e8f0;border-radius:10px;font-size:13px;font-family:'Inter',sans-serif;outline:none;color:#1e293b;background:#fff;transition:border .15s;}
.field:focus{border-color:#0078d4;box-shadow:0 0 0 3px rgba(0,120,212,.1);}
.lbl{font-size:11px;font-weight:600;color:#64748b;text-transform:uppercase;letter-spacing:.06em;margin-bottom:6px;display:block;}
.avatar{border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:600;flex-shrink:0;}
.file-card{background:#fff;border:1.5px solid #e2e8f0;border-radius:14px;overflow:hidden;margin-bottom:10px;transition:border .15s,box-shadow .15s;}
.file-card:hover{border-color:#69b3f5;box-shadow:0 4px 16px rgba(0,120,212,.08);}
.file-card-open{border-color:#0078d4!important;}
.badge{font-size:11px;padding:2px 8px;border-radius:20px;font-weight:600;background:#dbeafe;color:#1e40af;}
.meta{font-size:12px;color:#94a3b8;display:flex;align-items:center;gap:6px;flex-wrap:wrap;}
.dot{width:3px;height:3px;border-radius:50%;background:#cbd5e1;flex-shrink:0;}
.btn{display:inline-flex;align-items:center;gap:5px;padding:7px 14px;border-radius:8px;font-size:12px;font-weight:500;cursor:pointer;border:1.5px solid;font-family:'Inter',sans-serif;transition:all .15s;}
.btn-ghost{border-color:#e2e8f0;background:#f8fafc;color:#64748b;}
.btn-ghost:hover{border-color:#69b3f5;background:#eff6ff;color:#0078d4;}
.btn-blue{border-color:#0078d4;background:#0078d4;color:#fff;}
.btn-blue:hover{background:#106ebe;}
.btn-outline{border-color:#69b3f5;background:#eff6ff;color:#0078d4;}
.drop{border:2px dashed #bfdbfe;border-radius:14px;padding:32px;text-align:center;cursor:pointer;background:#f8fafc;transition:all .15s;}
.drop:hover,.drop-over{border-color:#0078d4;background:#eff6ff;}
.pre{background:#f8fafc;border:1px solid #e2e8f0;border-radius:10px;padding:14px;font-size:12px;line-height:1.8;font-family:monospace;max-height:300px;overflow-y:auto;white-space:pre-wrap;word-break:break-word;margin-top:12px;}
.toast{position:fixed;bottom:24px;right:24px;padding:12px 18px;border-radius:10px;font-size:13px;font-weight:500;z-index:999;box-shadow:0 8px 24px rgba(0,0,0,.12);animation:up .25s ease;}
.t-ok{background:#ecfdf5;color:#065f46;border:1px solid #a7f3d0;}
.t-err{background:#fef2f2;color:#991b1b;border:1px solid #fecaca;}
.t-inf{background:#eff6ff;color:#1e40af;border:1px solid #bfdbfe;}
.empty{text-align:center;padding:48px 24px;border:2px dashed #e2e8f0;border-radius:14px;}
.spin{animation:rot 1s linear infinite;}
.bar{height:3px;background:#e2e8f0;border-radius:4px;overflow:hidden;margin-top:12px;}
.bar-fill{height:100%;background:linear-gradient(90deg,#0078d4,#50c0f0);border-radius:4px;animation:prog 1.5s ease-in-out infinite;}
@keyframes up{from{transform:translateY(12px);opacity:0}to{transform:translateY(0);opacity:1}}
@keyframes rot{from{transform:rotate(0)}to{transform:rotate(360deg)}}
@keyframes prog{0%{width:20%}50%{width:75%}100%{width:20%}}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useRef, useCallback } = React;

const PROXY  = "https://teamsgraph.onrender.com";
const ORG    = "Sogolytics";

const AC = [{bg:"#f3f0ff",c:"#6d28d9"},{bg:"#ecfdf5",c:"#065f46"},{bg:"#fff7ed",c:"#9a3412"},{bg:"#eff6ff",c:"#1e40af"},{bg:"#fdf4ff",c:"#86198f"},{bg:"#fefce8",c:"#854d0e"}];
const ac  = n => AC[n.split("").reduce((a,x)=>a+x.charCodeAt(0),0)%AC.length];
const ini = n => n.trim().split(" ").map(w=>w[0]).join("").toUpperCase().slice(0,2);
const fd  = d => new Date(d).toLocaleDateString("en-IN",{day:"2-digit",month:"short",year:"numeric"});
const fs  = b => b<1024?b+"B":b<1048576?(b/1024).toFixed(1)+"KB":(b/1048576).toFixed(1)+"MB";

function App() {
  const [tab,      setTab]      = useState("upload");
  const [files,    setFiles]    = useState([]);
  const [members,  setMembers]  = useState(()=> JSON.parse(localStorage.getItem("sm")||"[]"));
  const [fetching, setFetching] = useState(false);
  const [loadingFiles, setLoadingFiles] = useState(false);
  const [search,   setSearch]   = useState("");
  const [preview,  setPreview]  = useState(null);
  const [toast,    setToast]    = useState(null);
  const [selMem,   setSelMem]   = useState(null);
  const [title,    setTitle]    = useState("");
  const [desc,     setDesc]     = useState("");
  const [selFile,  setSelFile]  = useState(null);
  const [dragOver, setDragOver] = useState(false);
  const [uploading,setUploading]= useState(false);
  const fileRef = useRef();

  const toast_ = useCallback((msg, sev="success") => {
    setToast({msg,sev}); setTimeout(()=>setToast(null),3500);
  }, []);

  const loadMembers = useCallback(async () => {
    setFetching(true);
    try {
      const r = await fetch(`${PROXY}/members?org=${ORG}`);
      if (!r.ok){ const e=await r.json().catch(()=>({})); throw new Error(e.error||`HTTP ${r.status}`); }
      const d = await r.json();
      const m = d.members||[];
      setMembers(m);
      localStorage.setItem("sm", JSON.stringify(m));
      toast_(`${m.length} members loaded`,"info");
    } catch(e){ toast_(`Error: ${e.message}`,"error"); }
    setFetching(false);
  }, [toast_]);

  const loadFiles = useCallback(async () => {
    setLoadingFiles(true);
    try {
      const r = await fetch(`${PROXY}/files`);
      if (!r.ok){ const e=await r.json().catch(()=>({})); throw new Error(e.error||`HTTP ${r.status}`); }
      const d = await r.json();
      setFiles((d.files||[]).map(f=>({
        id:f.id, filename:f.filename, title:f.title, desc:f.description,
        uploader:f.uploader, email:f.email, size:f.size, ts:f.uploaded_at, content:f.content
      })));
    } catch(e){ toast_(`Files: ${e.message}`,"error"); }
    setLoadingFiles(false);
  }, [toast_]);

  useEffect(()=>{
    if (members.length === 0) loadMembers();
    loadFiles();
  }, []);  // eslint-disable-line

  const pickFile = f => {
    if (!f) return;
    if (!f.name.endsWith(".md")){ toast_("Only .md files allowed","error"); return; }
    setSelFile(f);
  };

  const upload = async () => {
    if (!selFile||!selMem||uploading) return;
    setUploading(true);
    try {
      const content = await selFile.text();
      const body = {
        id:`${Date.now()}-${Math.random().toString(36).slice(2)}`,
        filename:selFile.name, title:title.trim()||selFile.name.replace(".md",""),
        description:desc.trim(), uploader:selMem.displayName,
        email:selMem.email||"", size:selFile.size, uploaded_at:Date.now(), content
      };
      const r = await fetch(`${PROXY}/files`,{
        method:"POST", headers:{"Content-Type":"application/json"}, body:JSON.stringify(body)
      });
      if (!r.ok){ const e=await r.json().catch(()=>({})); throw new Error(e.error||`HTTP ${r.status}`); }
      await loadFiles();
      setTab("browse"); setTitle(""); setDesc(""); setSelFile(null); setSelMem(null);
      toast_(`${selFile.name} uploaded`);
    } catch(e){ toast_(`Upload failed: ${e.message}`,"error"); }
    setUploading(false);
  };

  const download = f => {
    const a = document.createElement("a");
    a.href = URL.createObjectURL(new Blob([f.content],{type:"text/markdown"}));
    a.download = f.filename; a.click();
    toast_(`Downloaded ${f.filename}`);
  };

  const filtered = files.filter(f=>{
    const q=search.toLowerCase();
    return !q||[f.filename,f.uploader,f.content,f.title||"",f.desc||""].some(s=>s.toLowerCase().includes(q));
  });

  const uniq = new Set(files.map(f=>f.uploader)).size;
  const ready = selMem && selFile;

  return (
    <div className="wrap">
      {toast && <div className={`toast ${toast.sev==="error"?"t-err":toast.sev==="info"?"t-inf":"t-ok"}`}>{toast.msg}</div>}

      {/* Header */}
      <div className="header-card">
        <div style={{display:"flex",alignItems:"center",gap:12,marginBottom:14,flexWrap:"wrap"}}>
          <div style={{width:46,height:46,borderRadius:12,background:"rgba(255,255,255,.2)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:24}}>📂</div>
          <div style={{flex:1}}>
            <h1 style={{fontSize:22,fontWeight:600,color:"#fff",margin:0}}>Team Skills Directory</h1>
            <p style={{fontSize:13,color:"rgba(255,255,255,.8)",margin:0}}>dev.azure.com / <b>Sogolytics</b></p>
          </div>
          <div style={{display:"flex",alignItems:"center",gap:6,fontSize:11,padding:"4px 12px",borderRadius:20,background:"rgba(255,255,255,.15)",color:"#fff",border:"1px solid rgba(255,255,255,.25)",cursor:"pointer"}} onClick={loadMembers}>
            {fetching
              ? <><svg className="spin" width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3" strokeLinecap="round"><path d="M21 12a9 9 0 1 1-6.219-8.56"/></svg> Loading…</>
              : <>● {members.length} members ↻</>}
          </div>
        </div>
        <div style={{display:"flex",gap:12,flexWrap:"wrap"}}>
          {[["📄",files.length,"Total files"],["👥",uniq,"Contributors"]].map(([ic,v,l])=>(
            <div key={l} style={{display:"flex",alignItems:"center",gap:8,background:"rgba(255,255,255,.15)",borderRadius:10,padding:"8px 14px"}}>
              <span>{ic}</span>
              <div><p style={{margin:0,fontSize:18,fontWeight:600,color:"#fff",lineHeight:1}}>{v}</p><p style={{margin:0,fontSize:11,color:"rgba(255,255,255,.7)"}}>{l}</p></div>
            </div>
          ))}
        </div>
      </div>

      {/* Tabs */}
      <div className="card">
        <div className="section" style={{paddingBottom:0}}>
          <div className="tab-bar">
            {[["upload","Upload"],["browse",`Browse (${files.length})`]].map(([t,l])=>(
              <button key={t} className={`tab-btn ${tab===t?"tab-active":"tab-inactive"}`} onClick={()=>setTab(t)}>{l}</button>
            ))}
          </div>
        </div>

        {/* Upload */}
        {tab==="upload"&&(
          <div className="section" style={{maxWidth:540}}>
            {members.length===0?(
              <div className="empty">
                {fetching
                  ? <><div className="bar"><div className="bar-fill"/></div><p style={{marginTop:12,fontSize:13,color:"#64748b"}}>Loading Azure DevOps members…</p></>
                  : <><p style={{fontSize:14,fontWeight:600,marginBottom:8}}>Could not load members</p><button className="btn btn-blue" onClick={loadMembers}>Retry</button></>}
              </div>
            ):(
              <>
                <div style={{marginBottom:16}}>
                  <span className="lbl">Select team member</span>
                  <select className="field" value={selMem?.id||""} onChange={e=>setSelMem(members.find(x=>x.id===e.target.value)||null)}>
                    <option value="">— Choose from Azure DevOps —</option>
                    {members.map(m=><option key={m.id} value={m.id}>{m.displayName}{m.email?` (${m.email})`:""}</option>)}
                  </select>
                  {selMem&&(
                    <div style={{display:"flex",alignItems:"center",gap:10,marginTop:10,padding:"10px 14px",background:"#eff6ff",borderRadius:10,border:"1.5px solid #bfdbfe"}}>
                      <div className="avatar" style={{width:36,height:36,fontSize:12,background:ac(selMem.displayName).bg,color:ac(selMem.displayName).c}}>{ini(selMem.displayName)}</div>
                      <div>
                        <p style={{margin:0,fontSize:13,fontWeight:600,color:"#1e293b"}}>{selMem.displayName}</p>
                        <p style={{margin:0,fontSize:11,color:"#0369a1"}}>{selMem.email||"Azure DevOps member"}</p>
                      </div>
                    </div>
                  )}
                </div>

                <div style={{marginBottom:14}}>
                  <span className="lbl">File title</span>
                  <input className="field" value={title} onChange={e=>setTitle(e.target.value)} placeholder="e.g. Frontend & React Skills"/>
                </div>
                <div style={{marginBottom:14}}>
                  <span className="lbl">Short description</span>
                  <textarea className="field" value={desc} onChange={e=>setDesc(e.target.value)} placeholder="Brief summary of skills covered" rows={2} style={{resize:"vertical",lineHeight:1.6}}/>
                </div>

                <div style={{marginBottom:18}}>
                  <span className="lbl">skill.md file</span>
                  <div className={`drop${dragOver?" drop-over":""}`}
                    onDragOver={e=>{e.preventDefault();setDragOver(true)}}
                    onDragLeave={()=>setDragOver(false)}
                    onDrop={e=>{e.preventDefault();setDragOver(false);pickFile(e.dataTransfer.files[0]);}}
                    onClick={()=>fileRef.current.click()}
                  >
                    {selFile?(
                      <div style={{display:"flex",alignItems:"center",justifyContent:"center",gap:12}}>
                        <span style={{fontSize:28}}>📄</span>
                        <div style={{textAlign:"left"}}>
                          <p style={{margin:0,fontSize:14,fontWeight:600,color:"#1e293b"}}>{selFile.name}</p>
                          <p style={{margin:"2px 0 0",fontSize:12,color:"#64748b"}}>
                            {(selFile.size/1024).toFixed(1)} KB ·{" "}
                            <span style={{color:"#0078d4",cursor:"pointer"}} onClick={e=>{e.stopPropagation();setSelFile(null);fileRef.current.value="";}}>Remove</span>
                          </p>
                        </div>
                      </div>
                    ):(
                      <>
                        <div style={{fontSize:32,marginBottom:8}}>☁️</div>
                        <p style={{fontSize:14,fontWeight:600,color:"#1e293b",marginBottom:4}}>Drop your <code style={{background:"#dbeafe",color:"#1e40af",padding:"1px 6px",borderRadius:4,fontSize:12}}>skill.md</code> here</p>
                        <p style={{fontSize:12,color:"#94a3b8"}}>or click to browse · .md files only</p>
                      </>
                    )}
                  </div>
                  <input ref={fileRef} type="file" accept=".md" style={{display:"none"}} onChange={e=>pickFile(e.target.files[0])}/>
                </div>

                <button onClick={upload} disabled={!ready||uploading}
                  style={{width:"100%",padding:"12px",borderRadius:10,border:"none",fontFamily:"Inter,sans-serif",
                    background:ready&&!uploading?"#0078d4":"#e2e8f0",
                    color:ready&&!uploading?"#fff":"#94a3b8",
                    fontSize:14,fontWeight:600,
                    cursor:ready&&!uploading?"pointer":"not-allowed"}}>
                  {uploading?"Uploading…":"Upload skill file"}
                </button>
                {!ready&&<p style={{fontSize:11,color:"#94a3b8",textAlign:"center",marginTop:8}}>
                  {!selMem&&!selFile?"Select a member and .md file":!selMem?"Select a team member":"Select a .md file"}
                </p>}
              </>
            )}
          </div>
        )}

        {/* Browse */}
        {tab==="browse"&&(
          <div className="section">
            <div style={{position:"relative",marginBottom:16}}>
              <span style={{position:"absolute",left:13,top:"50%",transform:"translateY(-50%)",color:"#94a3b8",fontSize:16}}>⌕</span>
              <input className="field" value={search} onChange={e=>setSearch(e.target.value)}
                placeholder="Search by name, filename or content…" style={{paddingLeft:38}}/>
            </div>

            {files.length===0&&(
              <div className="empty">
                <p style={{fontSize:15,fontWeight:600,marginBottom:6}}>No files yet</p>
                <p style={{fontSize:13,color:"#64748b",marginBottom:16}}>Upload your first skill.md</p>
                <button className="btn btn-blue" onClick={()=>setTab("upload")}>Upload now</button>
              </div>
            )}
            {files.length>0&&filtered.length===0&&<p style={{textAlign:"center",color:"#94a3b8",fontSize:13,padding:"2rem"}}>No results.</p>}

            {filtered.map(f=>{
              const {bg,c} = ac(f.uploader);
              const open = preview?.id===f.id;
              return (
                <div key={f.id} className={`file-card${open?" file-card-open":""}`}>
                  <div style={{display:"flex",alignItems:"center",gap:14,padding:"16px 18px"}}>
                    <div className="avatar" style={{width:42,height:42,fontSize:13,background:bg,color:c}}>{ini(f.uploader)}</div>
                    <div style={{flex:1,minWidth:0}}>
                      <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:3}}>
                        <span style={{fontSize:14,fontWeight:600,color:"#1e293b",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{f.title||f.filename}</span>
                        <span className="badge">MD</span>
                      </div>
                      {f.desc&&<p style={{fontSize:12,color:"#475569",margin:"0 0 3px",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{f.desc}</p>}
                      <div className="meta">
                        <span style={{fontWeight:500,color:"#475569"}}>{f.uploader}</span>
                        {f.email&&<><span className="dot"/><span>{f.email}</span></>}
                        <span className="dot"/><span>{fd(f.ts)}</span>
                        <span className="dot"/><span>{fs(f.size)}</span>
                      </div>
                    </div>
                    <div style={{display:"flex",gap:8,flexShrink:0}}>
                      <button className={`btn ${open?"btn-outline":"btn-ghost"}`} onClick={()=>setPreview(open?null:f)}>
                        {open?"Hide":"Preview"}
                      </button>
                      <button className="btn btn-blue" onClick={()=>download(f)}>Download</button>
                    </div>
                  </div>
                  {open&&<div style={{padding:"0 18px 16px"}}><pre className="pre">{f.content}</pre></div>}
                </div>
              );
            })}

            {files.length>0&&(
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",borderTop:"1px solid #f1f5f9",paddingTop:14,marginTop:8}}>
                <span style={{fontSize:12,color:"#94a3b8"}}>{files.length} file{files.length!==1?"s":""} · {uniq} contributor{uniq!==1?"s":""}</span>
                <button className="btn btn-outline" onClick={()=>setTab("upload")}>+ Upload yours</button>
              </div>
            )}
          </div>
        )}
      </div>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<App/>);
</script>
</body>
</html>
